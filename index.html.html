<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROW Application Assistant</title>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e8f0fe 0%, #f5f7ff 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== CHAT CONTAINER ===== */
    .chat-container {
      width: 460px;
      max-width: 96vw;
      height: 640px;
      max-height: 92vh;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .chat-header {
      background: linear-gradient(135deg, #003366 0%, #005b99 100%);
      color: #fff;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 44px; height: 44px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .chat-header .info h2 { font-size: 16px; font-weight: 600; }
    .chat-header .info p  { font-size: 12px; opacity: .85; margin-top: 2px; }

    /* ===== MESSAGES AREA ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: #f9fafc;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c5cdd8; border-radius: 10px; }

    /* ===== BUBBLES ===== */
    .msg { max-width: 85%; animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg.bot .bubble {
      background: #fff;
      color: #1a1a2e;
      border: 1px solid #e4e8ee;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #003366, #005b99);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg .bubble strong { color: #003366; }
    .msg.user .bubble strong { color: #aad4ff; }

    .msg .bubble ul, .msg .bubble ol {
      margin: 6px 0 2px 18px;
      font-size: 13.5px;
    }
    .msg .bubble li { margin-bottom: 4px; }

    /* ===== QUICK BUTTONS ===== */
    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .quick-btn {
      background: #eef3ff;
      color: #003366;
      border: 1px solid #c9d6f0;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12.5px;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .quick-btn:hover {
      background: #003366;
      color: #fff;
      border-color: #003366;
    }

    /* ===== INPUT BAR ===== */
    .chat-input {
      padding: 14px 16px;
      border-top: 1px solid #e8ecf1;
      display: flex;
      gap: 10px;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input input {
      flex: 1;
      border: 1.5px solid #dce1ea;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    .chat-input input:focus { border-color: #005b99; }
    .chat-input input::placeholder { color: #a0aab5; }

    .chat-input button {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #003366, #005b99);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, box-shadow .2s;
      flex-shrink: 0;
    }
    .chat-input button:hover { transform: scale(1.08); box-shadow: 0 3px 10px rgba(0,51,102,.3); }

    /* ===== TYPING INDICATOR ===== */
    .typing { display: flex; gap: 5px; padding: 8px 0; }
    .typing span {
      width: 8px; height: 8px;
      background: #b0bec5;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ===== INLINE TABLES ===== */
    .msg .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 12.5px;
      border-radius: 6px;
      overflow: hidden;
    }
    .msg .bubble table th {
      background: #003366;
      color: #fff;
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
    }
    .msg .bubble table td {
      padding: 5px 8px;
      border-bottom: 1px solid #e8ecf1;
    }
    .msg .bubble table tr:nth-child(even) td {
      background: #f5f8ff;
    }
    .msg .bubble table tr:last-child td {
      border-bottom: none;
    }

    /* ===== STEP CARDS ===== */
    .step-card {
      background: #f0f5ff;
      border-left: 3px solid #005b99;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 13.5px;
    }
    .step-card .step-num {
      font-weight: 700;
      color: #003366;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>ROW Application Assistant</h2>
      <p>Ask me anything about the ROW Application</p>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- INPUT -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off" />
    <button id="sendBtn" title="Send">&#10148;</button>
  </div>
</div>

<script>

// ============================
const KB = [
  {
    keywords: ["hello","hi","hey","help","start","menu","what can you do","assist"],

  {
    keywords: ["create","new","generate","application","create row","create application","how to create","draft"],

  {

// ============================
// DOM
// ============================
const chatMessages = document.getElementById('chatMessages');
const userInput    = document.getElementById('userInput');
const sendBtn      = document.getElementById('sendBtn');

// ============================
// HELPERS
// ============================
function addMessage(html, sender, quickButtons) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${sender}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrapper.appendChild(bubble);

  if (quickButtons && quickButtons.length) {
    const qDiv = document.createElement('div');
    qDiv.className = 'quick-buttons';
    quickButtons.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => handleQuickButton(label));
      qDiv.appendChild(btn);
    });
    wrapper.appendChild(qDiv);
  }

  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.id = 'typingIndicator';
  wrapper.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// ============================
// MATCHING
// ============================
function findAnswer(input) {
  const lower = input.toLowerCase().trim();

  let bestMatch = null;
  let bestScore = 0;

  for (const entry of KB) {
    let score = 0;
    for (const kw of entry.keywords) {
      if (lower.includes(kw)) {
        score += kw.length;           // longer keyword matches = higher score
        if (lower === kw) score += 10; // exact match bonus
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
    }
  }

  if (bestMatch && bestScore > 0) return bestMatch;

  return {
    answer: `I'm not sure about that. Could you try asking in a different way? Here are some topics I can help with:`,
    quickButtons: ["Create Application", "Search Span", "Split Span", "Merge Application", "Submit Application", "Joint Survey", "Processing Fee", "Glossary", "Main Menu"]
  };
}

// ============================
// HANDLE INPUT
// ============================
function handleUserMessage(text) {
  if (!text.trim()) return;
  addMessage(text, 'user');
  userInput.value = '';

  showTyping();

  setTimeout(() => {
    removeTyping();
    const result = findAnswer(text);
    addMessage(result.answer, 'bot', result.quickButtons);
  }, 500 + Math.random() * 400);
}

function handleQuickButton(label) {
  const map = {
    "Main Menu": "hello",
    "Create Application": "how to create a new ROW application",
    "Search Span": "how to search for span details",
    "Split Span": "how to split a span",
    "Merge Application": "how to merge applications",
    "Submit Application": "how to submit application acknowledgement",
    "Joint Survey": "how to capture joint survey details",
    "Processing Fee": "how to capture processing fee",
    "Update Authority": "how to update authority",
    "Glossary": "glossary abbreviations",
    "Roles & Tasks": "roles and tasks",
    "ROW Executive Tasks": "row executive tasks",
    "SCO Tasks": "sco tasks",
    "State FC&A Tasks": "state fc&a tasks",
    "Location Info": "location info shq"
  };
  const query = map[label] || label;
  handleUserMessage(query);
}

// ============================
// EVENTS
// ============================
sendBtn.addEventListener('click', () => handleUserMessage(userInput.value));
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleUserMessage(userInput.value);
});

// ============================
// WELCOME MESSAGE
// ============================
setTimeout(() => {
  addMessage(
    `Hello! 👋 Welcome to the <strong>ROW Application Assistant</strong>.<br><br>I can guide you through the entire ROW Application process — from creating applications to processing fee approvals. You can also ask me about <strong>roles, tasks, users & locations</strong>.<br><br>Choose a topic below or type your question!`,
    'bot',
    ["Create Application", "Roles & Tasks", "Search Span", "Split Span", "Merge Application", "Submit Application", "Joint Survey", "Processing Fee", "Glossary"]
  );
}, 400);
</script>
